<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al Quran Kareem</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f6ff;
}

/* Header */

header{
background:linear-gradient(45deg,#0a7b3e,#00b894);
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* Menu Grid */

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
max-width:700px;
margin:auto;
}

/* Card Design */

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
font-size:17px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
border-left:5px solid #2b7cff;
transition:0.2s;
}

/* Hover Effect */

.card:hover{
transform:scale(1.03);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

</style>
<body>

<header>
Al Quran Kareem
</header>

<div class="menu">

<div class="card" onclick="location.href='quran.html'">
📖 Surah + Audio
</div>

<div class="card" onclick="location.href='para.html'">
📜 Para (Juz) + Audio
</div>

<div class="card" onclick="location.href='tasbeeh.html'">
📿 Digital Tasbeeh
</div>

<div class="card" onclick="location.href='qibla.html'">
🧭 Qibla Direction
</div>

<div class="card" onclick="location.href='dua.html'">
🤲 Dua Collection
</div>

<div class="card" onclick="location.href='allah.html'">
🕌 99 Names of Allah
</div>

<div class="card" onclick="location.href='prayer.html'">
🕌 Prayer Time
</div>

<div class="card" onclick="location.href='hadith.html'">
🌙 Daily Hadith
</div>

<div class="card" onclick="location.href='settings.html'">
⚙️ Settings
</div>

</div>

</body>
</html>
