<section id="settings">
    <h2 style="text-align:center; color:#006400; font-size:1.8rem; margin-bottom:20px;">⚙️ Settings</h2>

    <div class="setting-card">
        <h3>🌗 Theme</h3>
        <button class="setting-btn" onclick="toggleTheme()">Toggle Light / Dark Mode</button>
    </div>

    <div class="setting-card">
        <h3>🔔 Notifications</h3>
        <button class="setting-btn" onclick="toggleNotifications()">Toggle Notifications</button>
    </div>

    <div class="setting-card">
        <h3>🔠 Font Size</h3>
        <div style="display:flex; gap:10px;">
            <button class="setting-btn-small" onclick="increaseFont()">A+</button>
            <button class="setting-btn-small" onclick="decreaseFont()">A-</button>
        </div>
    </div>

    <div class="setting-card">
        <h3>🎧 Audio</h3>
        <button class="setting-btn" onclick="toggleAutoplay()">Toggle Audio Autoplay</button>
    </div>

    <div class="setting-card">
        <h3>⚠️ Reset App (Owner Only)</h3>
        <button class="setting-btn reset-btn" onclick="resetApp()">Reset App</button>
    </div>

    <div class="setting-card" style="text-align:center; font-size:0.9rem; color:#555;">
        <p>Islamic App v1.0 – Made by Bilal</p>
        <p>Features: Quran, Juz, Dua, Tasbeeh, Qibla, Prayer Times, Hadith</p>
    </div>
</section>

<style>
.setting-card {
    background:#fff;
    border-radius:12px;
    padding:15px;
    margin:12px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}
.setting-card:hover {
    transform: translateY(-3px);
}
.setting-btn {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#006400;
    color:white;
    font-size:1rem;
    cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);
    transition: background 0.3s;
}
.setting-btn:hover {
    background:#228B22;
}
.setting-btn-small {
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#006400;
    color:white;
    font-size:0.9rem;
    cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);
    transition: background 0.3s;
}
.setting-btn-small:hover {
    background:#228B22;
}
.reset-btn {
    background:#B22222;
}
.reset-btn:hover {
    background:#FF4500;
}

/* Dark Mode Styling */
.dark-mode .setting-card { background:#1e1e1e; color:#f5f5f5; box-shadow:0 4px 10px rgba(0,0,0,0.4);}
.dark-mode .setting-btn, .dark-mode .setting-btn-small { background:#228B22; color:white;}
.dark-mode .reset-btn { background:#8B0000;}
</style>

<script>
// ===== Dark Mode =====
function toggleTheme(){
    document.body.classList.toggle('dark-mode');
}

// ===== Notifications =====
let notificationsEnabled = false;
function toggleNotifications(){
    notificationsEnabled = !notificationsEnabled;
    alert('Notifications ' + (notificationsEnabled ? 'Enabled' : 'Disabled'));
}

// ===== Font Size =====
let fontSize = 16;
function increaseFont(){
    fontSize += 2;
    document.querySelectorAll('section, p, div').forEach(el=>el.style.fontSize=fontSize+'px');
}
function decreaseFont(){
    if(fontSize>10){
        fontSize -= 2;
        document.querySelectorAll('section, p, div').forEach(el=>el.style.fontSize=fontSize+'px');
    }
}

// ===== Audio Autoplay =====
let autoplay = false;
function toggleAutoplay(){
    autoplay = !autoplay;
    alert('Audio autoplay ' + (autoplay ? 'Enabled' : 'Disabled'));
}

// ===== Reset App (Owner Only) =====
function resetApp(){
    if(confirm("Are you sure you want to reset the app?")){
        localStorage.clear();
        location.reload();
    }
}
</script>
