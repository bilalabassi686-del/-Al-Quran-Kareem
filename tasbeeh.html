<style>

#tasbeeh{
max-width:700px;
margin:auto;
padding:15px;
}

/* Card */

.tasbeeh-box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
border-left:6px solid #2b7cff;
text-align:center;
}

/* Dark Mode */

.dark{
background:#1e272e;
color:white;
}

.dark .tasbeeh-box{
background:#2f3640;
}

/* Counter */

.counter{
font-size:45px;
font-weight:bold;
margin:20px 0;
color:#2b7cff;
}

/* Zikr */

.zikr{
font-size:18px;
margin-bottom:15px;
}

/* Beads */

.beads{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-bottom:15px;
}

.bead{
width:14px;
height:14px;
margin:4px;
border-radius:50%;
background:#dcdde1;
}

.active{
background:#2b7cff;
}

/* Buttons */

.countBtn{
background:linear-gradient(145deg,#2b7cff,#1d5fd1);
color:white;
border:none;
padding:18px 30px;
font-size:20px;
border-radius:50px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
margin:5px;
}

.modeBtn{
background:#00b894;
color:white;
border:none;
padding:8px 15px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

.resetBtn{
background:#ff4757;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.darkBtn{
background:#333;
color:white;
border:none;
padding:8px 15px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

</style>


<section id="tasbeeh" class="hidden">

<div class="tasbeeh-box">

<h2> Digital Tasbeeh</h2>

<div class="zikr" id="zikrName">SubhanAllah</div>

<div class="counter" id="count">0</div>

<div class="beads" id="beads"></div>

<button class="countBtn" onclick="addCount()">TAP</button>

<br>

<button class="modeBtn" onclick="setLimit(33)">33</button>
<button class="modeBtn" onclick="setLimit(99)">99</button>

<br>

<button class="modeBtn" onclick="setZikr('SubhanAllah')">SubhanAllah</button>
<button class="modeBtn" onclick="setZikr('Alhamdulillah')">Alhamdulillah</button>
<button class="modeBtn" onclick="setZikr('Allahu Akbar')">Allahu Akbar</button>

<br>

<button class="resetBtn" onclick="resetCount()">Reset</button>

<br>

<button class="darkBtn" onclick="toggleDark()">Dark Mode</button>

</div>


<script>

let count = 0;
let limit = 33;

const countEl = document.getElementById("count");
const beadsEl = document.getElementById("beads");

/* Create beads */

function createBeads(){

beadsEl.innerHTML="";

for(let i=0;i<limit;i++){

let bead=document.createElement("div");

bead.classList.add("bead");

beadsEl.appendChild(bead);

}

}

createBeads();

/* Count */

function addCount(){

count++;

if(navigator.vibrate) navigator.vibrate(30);

if(count>limit) count=1;

countEl.innerText=count;

updateBeads();

playClick();

}

/* Update beads */

function updateBeads(){

let beads=document.querySelectorAll(".bead");

beads.forEach((b,i)=>{

b.classList.remove("active");

if(i<count) b.classList.add("active");

});

}

/* Reset */

function resetCount(){

count=0;

countEl.innerText=count;

updateBeads();

}

/* Limit */

function setLimit(num){

limit=num;

resetCount();

createBeads();

}

/* Zikr */

function setZikr(name){

document.getElementById("zikrName").innerText=name;

resetCount();

}

/* Dark Mode */

function toggleDark(){

document.body.classList.toggle("dark");

}

/* Sound */

function playClick(){

let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

audio.play();

}

</script>

</section>
