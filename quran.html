<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Qur'an Kareem - Surah List</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    margin: 0;
    padding: 0;
}
header {
    background: #006400;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 1.5rem;
}
.surah-list {
    padding: 20px;
}
.surah-item {
    background: #fff;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.2);
    cursor: pointer;
}
.surah-item:hover {
    background: #e0ffe0;
}
.surah-item .arabic {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    color: #000;
    direction: rtl;
}
.surah-item .english {
    font-size: 1rem;
    color: #555;
}
#reader {
    display: none;
    padding: 20px;
}
#title {
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 10px;
}
#arabic {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    line-height: 2;
    direction: rtl;
    text-align: right;
}
audio {
    width: 100%;
    margin-top: 15px;
}
button {
    background: #006400;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover { background: #228B22; }
</style>
</head>
<body>

<header>📖 Qur'an Kareem - Surah List</header>

<div class="surah-list" id="surahList">
    <!-- Surah list will load here -->
</div>

<div id="reader">
    <div id="title"></div>
    <div id="arabic"></div>
    <audio id="audio" controls></audio>
    <br>
    <button onclick="backToList()">🔙 Back to Surah List</button>
</div>

<script>
const surahListDiv = document.getElementById('surahList');
const reader = document.getElementById('reader');
const title = document.getElementById('title');
const arabic = document.getElementById('arabic');
const audio = document.getElementById('audio');

function loadSurahList() {
    fetch("https://api.alquran.cloud/v1/surah")
    .then(r=>r.json())
    .then(d=>{
        let html = '';
        d.data.forEach(s => {
            html += `
            <div class="surah-item" onclick="openSurah(${s.number})">
                <div class="english">${s.number}. ${s.englishName} (${s.englishNameTranslation})</div>
                <div class="arabic">${s.name}</div>
            </div>`;
        });
        surahListDiv.innerHTML = html;
    });
}

function openSurah(num) {
    surahListDiv.style.display = 'none';
    reader.style.display = 'block';
    title.innerText = 'Loading...';
    arabic.innerHTML = '';
    audio.style.display = 'none';

    fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`)
    .then(r=>r.json())
    .then(d=>{
        title.innerText = `${d.data.number}. ${d.data.englishName} (${d.data.englishNameTranslation})`;
        let text = '';
        if(num !== 9){ text += `<div class="arabic" style="font-size:2rem; text-align:center;">﷽</div>`; }
        d.data.ayahs.forEach(a=>{
            text += `<div class="arabic">${a.text}</div>`;
        });
        arabic.innerHTML = text;
        audio.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${num}.mp3`;
        audio.style.display = 'block';
    });
}

function backToList() {
    reader.style.display = 'none';
    surahListDiv.style.display = 'block';
}

loadSurahList();
</script>

</body>
</html>
